# External test suite registry.
#
# Each [[suite]] entry describes an external test suite that can be run
# against extenddb. Suites are referenced by path — never copied into the repo.
#
# Fields:
#   name        — Human-readable name (used in reports)
#   path        — Absolute path or ~ path to the suite root directory
#   runner      — Build/test tool: "maven", "gradle", "pytest", "cargo"
#   env         — Environment variables passed to the test runner
#   args        — Extra arguments passed to the test command
#   prereqs     — Commands that must succeed for the suite to be runnable
#   enabled     — Set to false to skip without removing the entry

[[suite]]
name = "DynamoDB PostgreSQL Extension Functional Tests"
path = "~/source/DynamoDBPostgreSQLExtensionFunctionalTest"
runner = "maven"
enabled = true

[suite.env]
DDB_ENDPOINT = "${EXTENDDB_ENDPOINT}"

[[suite]]
name = "BigBird Functional Test Request Router"
path = "~/source/BigBirdFunctionalTestRequestRouter"
runner = "gradle"
enabled = false  # Requires Brazil build system — not runnable externally
